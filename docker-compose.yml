services:
  db:
    image: postgres:15-alpine
    container_name: klubly-db
    restart: always
    environment:
      POSTGRES_DB: klubly_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: klubly-adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  pgdata:
